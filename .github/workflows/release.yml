name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: doh-proxy-gui
            archive: doh-proxy-gui-macos-arm64.tar.gz

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: doh-proxy-gui
            archive: doh-proxy-gui-macos-x86_64.tar.gz

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: doh-proxy-gui
            archive: doh-proxy-gui-linux-x86_64.tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y libgl1-mesa-dev libx11-dev libwayland-dev pkg-config

      - name: Build
        run: cargo build --release --features gui --bin doh-proxy-gui --target ${{ matrix.target }}

      - name: Package
        run: |
          tar -czf ${{ matrix.archive }} -C target/${{ matrix.target }}/release ${{ matrix.artifact }}

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive }}
